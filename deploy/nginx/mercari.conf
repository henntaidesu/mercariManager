# ─────────────────────────────────────────────────────────────────────────────
# Mercari 生产环境 Nginx 反向代理 + TLS 终止
#
# 架构：
#   浏览器 ──HTTPS(443)──► Nginx ──HTTP(127.0.0.1:9601)──► FastAPI(uvicorn)
#
# 前端全部使用同源相对路径（/mercariV2、/imges、SPA 在 /，hash 路由 #/...），
# 因此 Nginx 只需做 TLS 终止 + 反向代理，无需改任何前端代码或环境变量。
#
# 两种部署方式（择一）：
#   A) 简单：把所有请求都转发给后端（后端已挂载 webside/dist 作为 SPA）。
#   B) 高性能：Nginx 直接吐静态文件，仅把 /mercariV2、/imges、/api 代理给后端。
# 下面默认给出 (B)，并在注释里标出 (A) 的改法。
# ─────────────────────────────────────────────────────────────────────────────

# 后端 upstream（uvicorn 监听 127.0.0.1:9601）
upstream mercari_backend {
    server 127.0.0.1:9601;
    keepalive 32;
}

# ── HTTP：强制跳转 HTTPS ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mercari.makurochan.com;   # ← 改成你的域名

    # Let's Encrypt 证书续期校验（用 certbot --webroot 时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主站 ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mercari.makurochan.com;   # ← 改成你的域名

    # ── SSL 证书挂载点（把你的正式证书放到这两条路径） ───────────────────────
    #   - fullchain：站点证书 + 中间 CA 证书（合并的 PEM）
    #   - privkey  ：私钥
    # Let's Encrypt（certbot）默认路径示例如下；自有证书改成对应文件即可。
    ssl_certificate     /etc/letsencrypt/live/mercari.makurochan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercari.makurochan.com/privkey.pem;

    # ── TLS 安全参数 ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # HSTS（确认全站 HTTPS 后再开启，避免误锁）
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 图片 Base64 上传 / 历史数据等较大请求体
    client_max_body_size 64m;

    # 公共代理头（透传真实协议/IP，后端据此判断 https）
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    # WebSocket 兼容（如后端无 WS 也无害）
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # 浏览器自动化 / MITM / 同步等接口可能较慢，放宽读超时
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── API：反向代理到后端 ──────────────────────────────────────────────────
    location /mercariV2/ {
        proxy_pass http://mercari_backend;
    }

    # 兼容旧健康检查路径
    location /api/ {
        proxy_pass http://mercari_backend;
    }

    # ── 商品图片（后端 StaticFiles 挂载在 /imges） ──────────────────────────
    location /imges/ {
        proxy_pass http://mercari_backend;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA（方式 A，默认：全部转给后端，由后端挂载 webside/dist 提供）──────────
    # 双模式（nginx 域名 + 直连端口/内网）共用同一个后端 SPA，零分叉。
    # 前提：后端启动时存在 webside/dist 且未设 MERCARI_NO_STATIC=1。
    location / {
        proxy_pass http://mercari_backend;
    }

    # ── 方式 B（可选，高性能：Nginx 直接吐静态文件）──────────────────────────
    # 若想让 Nginx 直接提供静态资源（更快），把上面 location / 换成下面这段。
    # 注意：直连端口/内网模式仍由后端的 dist 提供，两者指向同一份 dist 即可。
    #
    # location / {
    #     root  /opt/mercari/webside/dist;   # ← 改成你的 dist 绝对路径
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    # }
}

# WebSocket 升级映射（放在 http{} 块内一次即可；若已在 nginx.conf 定义则删除此处）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
